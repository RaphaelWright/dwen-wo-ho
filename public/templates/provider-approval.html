<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Provider Approval - JustGo Health</title>
    <style type="text/css">
        @media only screen and (max-width: 600px) {
            .container { width: 100% !important; }
            .title { font-size: 24px !important; }
            .body-text { font-size: 14px !important; }
            .congrats { font-size: 16px !important; }
        }
    </style>
    <!--[if mso]>
    <style type="text/css">
        body, table, td {font-family: Arial, sans-serif !important;}
    </style>
    <![endif]-->
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #ffffff;">
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #ffffff;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width: 600px; margin: 0 auto;">
                    <!-- Logo -->
                    <tr>
                        <td style="padding-bottom: 40px;">
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                                <tr>
                                    <td>
                                        <img src="https://dwen-wo-ho-nine.vercel.app/_next/image?url=%2Flogos%2Flogo-black.png&w=256&q=75" alt="JustGo Health" style="display: block; max-width: 150px; height: auto;" />
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Title with Icon -->
                    <tr>
                        <td style="padding-bottom: 30px;">
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                                <tr>
                                    <td style="vertical-align: middle;">
                                        <h1 class="title" style="margin: 0; font-size: 32px; font-weight: 700; color: #22c55e; line-height: 1.2; display: inline-block;">
                                            JustGo Health Provider
                                        </h1>
                                    </td>
                                    <td align="right" style="vertical-align: middle; padding-left: 12px;">
                                        <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                                            <tr>
                                                <td style="width: 40px; height: 40px; background-color: #955aa4; border-radius: 50%; text-align: center; vertical-align: middle;">
                                                    <span style="color: #ffffff; font-size: 24px; font-weight: bold; line-height: 40px;">✓</span>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Congratulations Message -->
                    <tr>
                        <td style="padding-bottom: 30px;">
                            <p class="congrats" style="margin: 0; font-size: 18px; line-height: 1.6; color: #1f2937; font-weight: 500;">
                                Congratulations! You have successfully joined JustGo Health as a Provider ({{SPECIALTY}}).
                            </p>
                        </td>
                    </tr>
                    
                    <!-- Contact Information -->
                    <tr>
                        <td style="padding-bottom: 40px;">
                            <p class="body-text" style="margin: 0; font-size: 16px; line-height: 1.6; color: #1f2937;">
                                We're happy to have you on board. For any assistance, reach out to Prince at <a href="mailto:prince.baadu7@gmail.com" style="color: #955aa4; text-decoration: none;">prince.baadu7@gmail.com</a> or call <a href="tel:0538920991" style="color: #955aa4; text-decoration: none;">0538920991</a>.
                            </p>
                        </td>
                    </tr>
                    
                    <!-- Closing -->
                    <tr>
                        <td style="padding-top: 40px; border-top: 1px solid #e5e7eb;">
                            <p style="margin: 0; font-size: 16px; line-height: 1.6; color: #1f2937;">
                                With love,<br>
                                <strong>The JustGo Health Team</strong>
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
