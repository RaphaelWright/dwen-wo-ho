<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>New Results - JustGo Health</title>
    <style type="text/css">
        @media only screen and (max-width: 600px) {
            .container { width: 100% !important; }
            .title { font-size: 24px !important; }
            .body-text { font-size: 14px !important; }
            .button { padding: 14px 24px !important; font-size: 14px !important; min-width: 180px !important; }
        }
    </style>
    <!--[if mso]>
    <style type="text/css">
        body, table, td {font-family: Arial, sans-serif !important;}
    </style>
    <![endif]-->
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #ffffff;">
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #ffffff;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width: 600px; margin: 0 auto;">
                    <!-- Logo -->
                    <tr>
                        <td style="padding-bottom: 40px;">
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                                <tr>
                                    <td>
                                        <img src="https://dwen-wo-ho-nine.vercel.app/_next/image?url=%2Flogos%2Flogo-black.png&w=256&q=75" alt="JustGo Health" style="display: block; max-width: 150px; height: auto;" />
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Title -->
                    <tr>
                        <td style="padding-bottom: 30px;">
                            <h1 class="title" style="margin: 0; font-size: 32px; font-weight: 700; color: #22c55e; line-height: 1.2;">
                                New Results ({{SCHOOL_NAME}})
                            </h1>
                        </td>
                    </tr>
                    
                    <!-- Body Text -->
                    <tr>
                        <td style="padding-bottom: 40px;">
                            <p class="body-text" style="margin: 0; font-size: 16px; line-height: 1.6; color: #1f2937;">
                                Hello, {{PATIENT_NAME}} has just completed a screening at {{SCHOOL_NAME}}. He's now waiting for you in the Waiting Room. Kindly reach out to provide care.
                            </p>
                        </td>
                    </tr>
                    
                    <!-- Button -->
                    <tr>
                        <td style="padding-bottom: 40px;">
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                                <tr>
                                    <td align="center" style="padding: 0;">
                                        <a href="https://dwen-wo-ho-nine.vercel.app/provider/patients/{{RESULT_ID}}" class="button" style="display: inline-block; background-color: #000000; color: #ffffff; text-decoration: none; padding: 16px 32px; border-radius: 8px; font-size: 16px; font-weight: 600; text-align: center; min-width: 200px;">
                                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin: 0 auto;">
                                                <tr>
                                                    <td style="padding-right: 8px; vertical-align: middle;">
                                                        <span style="color: #ffffff;">View Results</span>
                                                    </td>
                                                    <td style="vertical-align: middle;">
                                                        <img src="https://dwen-wo-ho-nine.vercel.app/arrow-vertical-white.svg" alt="→" style="display: block; width: 20px; height: 20px; vertical-align: middle;" />
                                                    </td>
                                                </tr>
                                            </table>
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td style="padding-top: 40px; border-top: 1px solid #e5e7eb;">
                            <p style="margin: 0; font-size: 14px; line-height: 1.5; color: #6b7280;">
                                JustGo Health
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
