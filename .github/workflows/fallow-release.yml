# Fallow release gate — strict `gate: all` on demand (no release/** branches yet).
# Run manually before tagging/shipping. PR gate remains fallow.yml (`new-only`).

name: Fallow Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fallow-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: fallow-rs/fallow@v2
        with:
          command: audit
          gate: all
          production-health: true
          fail-on-issues: true
          dead-code-baseline: fallow-baselines/dead-code.json
          health-baseline: fallow-baselines/health.json
          dupes-baseline: fallow-baselines/dupes.json
